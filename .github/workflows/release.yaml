# Cut a release whenever a new tag is pushed to the repo.
name: Release
on:
  # Can be triggered from the tag.yaml workflow
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
    secrets:
      publish_token:
        required: true
  # Or, developers can manually push a tag from their clone
  push:
    tags:
      - "v*.*.*"
permissions:
  id-token: write
  attestations: write
  contents: write
jobs:
  release:
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7.4.0
    with:
      release_files: rules_dart-*.tar.gz
      prerelease: false
      tag_name: ${{ inputs.tag_name || github.ref_name }}
  publish:
    needs: release
    uses: ./.github/workflows/publish.yaml
    with:
      tag_name: ${{ inputs.tag_name || github.ref_name }}
    secrets:
      publish_token: ${{ secrets.publish_token || secrets.BCR_PUBLISH_TOKEN }}
  pub-publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref_name }}
      - uses: dart-lang/setup-dart@v1
      - name: Inject version from tag
        run: |
          TAG="${{ inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^version: 0\.0\.0-dev$/version: $VERSION/" dart/runfiles/pubspec.yaml
          echo "Publishing runfiles $VERSION"
      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          NOTES=$(gh release view "$TAG" --json body --jq .body)
          printf '# Changelog\n\n## %s\n\n%s\n' "$VERSION" "$NOTES" \
            > dart/runfiles/CHANGELOG.md
      - name: Publish to pub.dev
        run: dart pub publish --force
        working-directory: dart/runfiles
